<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon | Pika pika!</title>
    <link rel="stylesheet" href="Ass_1_easy.css" />
  </head>
  <body>
    <main>
      <nav>
        <div class="logo">
          <img
            src="./Website_1_easy_assets/logo_pokemon-removebg-preview.png"
            alt="Pokemon logo"
          />
        </div>
        <div class="menu">
          <img src="./Website_1_easy_assets/icons8-menu.svg" alt="" />
        </div>
      </nav>
      <div class="container">
        <section class="left">
          <div class="text">
            <div class="subheading"><span>POKEMON GEN I</span></div>
            <div class="heading"><h1>Pikachu</h1></div>
            <div class="description">
              <p>
                Pikachu is an Electric-type Pokémon introduced <br />
                in Generation I. Pikachu are small, chubby, <br />
                and incredibly cute mouse-like Pokémon. <br />
                They are almost completely covered by <br> yellow fur.
              </p>
            </div>
            <div class="index">
                <div class="line"></div>
                <div class="number">01 / 08</div>
            </div>
          </div>
        </section>
        <section class="right">
            <div class="bubbleContainer">

                <div class="bubble"></div>
                <div class="bubble"></div>
                <div class="bubble"></div>
                <div class="bubble"></div>
                <div class="bubble"></div>
            </div>
        </section>
      </div>
      <figure class="pikachu">
        <img src="./Website_1_easy_assets/Pikachu.png" alt="">
      </figure>
      <figure class="lightBall">
        <img src="./Website_1_easy_assets/lightBall.png" alt="">
      </figure>
    </main>
  </body>
</html>
